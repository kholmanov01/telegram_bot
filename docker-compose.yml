# ============================================================
# Enterprise Telegram Task Management Bot — Docker Compose
# Production-ready: Postgres + Redis on internal network (no host ports).
# ============================================================
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskbot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-taskbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # NOTE: no `ports:` — Postgres is reachable only inside the Docker
    # network (host "postgres"). Do NOT expose 5432 to the internet.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskbot} -d ${POSTGRES_DB:-taskbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskbot_net

  redis:
    image: redis:7-alpine
    container_name: taskbot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    # NOTE: no `ports:` — Redis is reachable only inside the Docker network.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskbot_net

  bot:
    build: .
    container_name: taskbot_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./exports:/app/exports
    networks:
      - taskbot_net

volumes:
  postgres_data:
  redis_data:

networks:
  taskbot_net:
    driver: bridge
